<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="icon" href="{{ "favicon.png" | relURL }}">

    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ "css/custom.css" | relURL }}" rel="stylesheet">
  </head>

  <body>

    <nav class="navbar navbar-expand-md navbar-dark navbar-custom fixed-top">
      <div class="container">
        <a class="navbar-brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            {{ range .Site.Menus.main }}
            <li class="nav-item">
              <a class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}"
                 href="{{ .URL }}">{{ .Name }}</a>
            </li>
            {{ end }}
          </ul>
        </div>
      </div>
    </nav>

    {{ block "main" . }}{{ end }}

    <div class="container">
      <hr>
      <footer>
        <p>&copy; {{ .Site.Params.copyright }}. {{ .Site.Params.disclaimer }}</p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
